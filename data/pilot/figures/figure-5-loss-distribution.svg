<text x="24" y="34" font-size="16" font-weight="700" fill="#24292f">Figure 5 — How TEI and OntoLex fail</text>
<text x="24" y="54" font-size="12" fill="#5f6b7a">1277 loss reports. TEI is never lossy for the Western cases; OntoLex is never clean; the neutral lineage lane is the most lossy.</text>
