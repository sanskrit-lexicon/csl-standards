<text x="24" y="34" font-size="16" font-weight="700" fill="#24292f">Figure 3 — A Sanskrit root, modeled twice</text>
<text x="24" y="54" font-size="12" fill="#5f6b7a">Example: root √ac. The same root is a lexical entry and the derivational base of a word family.</text>
<rect x="240" y="80" width="280" height="56" rx="6" fill="#fff7df" stroke="#ebc169" stroke-width="1.5"/><text x="252" y="102" font-size="13" font-weight="700" fill="#24292f">√ ac</text><text x="252" y="119" font-size="11" font-weight="400" fill="#5f6b7a">verbal root · class 1P,1Ā</text>
<line x1="300" y1="136" x2="158.57181732479393" y2="181.25701845606594" stroke="#5f6b7a" stroke-width="2"/><polygon points="150,184 157.04793868927501,176.4948977200693 160.09569596031284,186.01913919206257" fill="#5f6b7a"/>
<line x1="420" y1="136" x2="571.3795634330096" y2="181.41386902990288" stroke="#5f6b7a" stroke-width="2"/><polygon points="580,184 569.9428240051778,186.20300045600865 572.8163028608413,176.62473760379712" fill="#5f6b7a"/>
<rect x="24" y="184" width="300" height="96" rx="6" fill="#edf5fb" stroke="#8db4d8" stroke-width="1.5"/><text x="36" y="206" font-size="13" font-weight="700" fill="#24292f">TEI archival profile</text><text x="36" y="223" font-size="11" font-weight="400" fill="#5f6b7a">&lt;entry type="verbal-root"&gt;</text><text x="36" y="240" font-size="11" font-weight="400" fill="#5f6b7a">  &lt;gramGrp&gt; class 1P,1Ā</text><text x="36" y="257" font-size="11" font-weight="400" fill="#5f6b7a">&lt;etym type="root"&gt; → Whitney ac,1</text>
<rect x="436" y="184" width="300" height="96" rx="6" fill="#edf8ed" stroke="#9bc89b" stroke-width="1.5"/><text x="448" y="206" font-size="13" font-weight="700" fill="#24292f">OntoLex / Lexicog</text><text x="448" y="223" font-size="11" font-weight="400" fill="#5f6b7a">ontolex:LexicalEntry</text><text x="448" y="240" font-size="11" font-weight="400" fill="#5f6b7a">csl:RootRelation</text><text x="448" y="257" font-size="11" font-weight="400" fill="#5f6b7a">  csl:whitneyRoot ac,1</text>
<text x="24" y="312" font-size="12" fill="#5f6b7a">§5: modeled as a plain entry the derivational scaffolding is implicit; the explicit root relation</text>
<text x="24" y="328" font-size="12" fill="#5f6b7a">carries the family/grammatical role that the bare entry loses.</text>
