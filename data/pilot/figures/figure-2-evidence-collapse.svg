<text x="24" y="34" font-size="16" font-weight="700" fill="#24292f">Figure 2 — Evidence collapse across the MW–PWG–PWK lineage</text>
<text x="24" y="54" font-size="12" fill="#5f6b7a">Named source citations carried per dictionary (250 lemmas). PWG's apparatus is far richer than MW's or PWK's.</text>
<text x="68" y="118" font-size="13" font-weight="700" fill="#24292f" text-anchor="end">PWG</text><rect x="80" y="96" width="560" height="32" rx="3" fill="#1f4f78"/><text x="648" y="118" font-size="13" fill="#24292f">1872</text>
<text x="68" y="174" font-size="13" font-weight="700" fill="#24292f" text-anchor="end">PWK</text><rect x="80" y="152" width="109" height="32" rx="3" fill="#1f4f78"/><text x="197" y="174" font-size="13" fill="#24292f">366</text>
<text x="68" y="230" font-size="13" font-weight="700" fill="#24292f" text-anchor="end">MW</text><rect x="80" y="208" width="113" height="32" rx="3" fill="#1f4f78"/><text x="201" y="230" font-size="13" fill="#24292f">379</text>
<text x="80" y="278" font-size="12" fill="#5f6b7a">In 119 of 250 lemmas (48%) MW carries no citation where PWG names a source.</text>
</svg>
