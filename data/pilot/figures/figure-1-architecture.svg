<text x="24" y="34" font-size="16" font-weight="700" fill="#24292f">Figure 1 — Three-view interoperability architecture</text>
<text x="24" y="54" font-size="12" fill="#5f6b7a">CDSL source records pass through one neutral model into three parallel standard profiles.</text>
<rect x="24" y="120" width="150" height="80" rx="6" fill="#edf5fb" stroke="#8db4d8" stroke-width="1.5"/><text x="99" y="146" font-size="14" font-weight="700" fill="#24292f" text-anchor="middle">CDSL</text><text x="99" y="166" font-size="11" fill="#5f6b7a" text-anchor="middle">MW · PWG · PWK raw</text>
<line x1="174" y1="160" x2="242" y2="160" stroke="#5f6b7a" stroke-width="2"/><polygon points="250,160 241,155 241,165" fill="#5f6b7a"/>
<rect x="250" y="120" width="170" height="80" rx="6" fill="#fff7df" stroke="#ebc169" stroke-width="1.5"/><text x="335" y="146" font-size="14" font-weight="700" fill="#24292f" text-anchor="middle">Neutral model</text><text x="335" y="166" font-size="11" fill="#5f6b7a" text-anchor="middle">senses · citations · relations</text>
<line x1="420" y1="110" x2="492" y2="110" stroke="#5f6b7a" stroke-width="2"/><polygon points="500,110 491,105 491,115" fill="#5f6b7a"/>
<line x1="420" y1="190" x2="492" y2="190" stroke="#5f6b7a" stroke-width="2"/><polygon points="500,190 491,185 491,195" fill="#5f6b7a"/>
<line x1="420" y1="270" x2="492" y2="270" stroke="#5f6b7a" stroke-width="2"/><polygon points="500,270 491,265 491,275" fill="#5f6b7a"/>
<rect x="500" y="78" width="236" height="64" rx="6" fill="#edf5fb" stroke="#8db4d8" stroke-width="1.5"/><text x="618" y="104" font-size="14" font-weight="700" fill="#24292f" text-anchor="middle">TEI</text><text x="618" y="124" font-size="11" fill="#5f6b7a" text-anchor="middle">archival profile + Lex-0 baseline</text>
<rect x="500" y="158" width="236" height="64" rx="6" fill="#edf5fb" stroke="#8db4d8" stroke-width="1.5"/><text x="618" y="184" font-size="14" font-weight="700" fill="#24292f" text-anchor="middle">OntoLex / FrAC</text><text x="618" y="204" font-size="11" fill="#5f6b7a" text-anchor="middle">Lexicog multi-resource graph</text>
